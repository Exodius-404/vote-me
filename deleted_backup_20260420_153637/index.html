<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Party Outfit Voting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Party Outfit Voting</h1>
    </header>

    <main>
        <!-- Login page (visible first) -->
        <section id="login-page" class="panel">
            <h2>Anmelden</h2>
            <div class="card">
                <input id="login-username" placeholder="Nutzername">
                <button id="btn-login-username">Anmelden</button>
                <div class="muted-note">Noch keinen Account? <a href="#" id="link-to-register">Erstelle einen Account</a></div>
            </div>
        </section>

        <!-- Register page -->
        <section id="register-page" class="panel hidden">
            <h2>Registrieren</h2>
            <div class="card">
                <input id="reg-username" placeholder="Gewünschter Nutzername">
                <label for="reg-file">Outfit-Foto</label>
                <input id="reg-file" type="file" accept="image/*">
                <button id="btn-register">Registrieren & Foto hochladen</button>
                <div id="register-status" class="small-gap" style="color:var(--muted)"></div>
                <div class="muted-note">Schon registriert? <a href="#" id="link-to-login">Zur Anmeldung</a></div>
            </div>
        </section>

        <!-- Voting page -->
        <section id="voting-page" class="panel hidden">
            <h2>Abstimmen</h2>
            <div id="current-user" class="current-user"></div>
            <div id="submissions-list"></div>
            <div class="small-gap">
                <button id="btn-submit-vote">Stimme abgeben</button>
                <button id="btn-logout" class="secondary btn-inline-space">Abmelden</button>
            </div>
        </section>

        <!-- Admin (kept hidden by default) -->
        <section id="admin-page" class="panel hidden">
            <h2>Admin Dashboard</h2>
            <button id="btn-refresh-stats">Statistiken aktualisieren</button>
            <div id="rankings"></div>
            <button id="btn-export-csv">Exportiere CSV</button>
        </section>
    </main>

    <footer>
        <small>Für mobile Nutzung optimiert. Firebase-Konfiguration in <em>app.js</em> einfügen.</small>
        <div id="build-banner" class="build-banner">Build-Version: 2026-04-20 (UI update)</div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
