<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Party Outfit Voting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Party Outfit Voting</h1>
        <nav>
            <button id="tab-submit">Outfit einreichen</button>
            <button id="tab-browse">Abstimmen</button>
            <button id="tab-admin">Admin</button>
        </nav>
    </header>

    <main>
        <section id="panel-submit" class="panel">
            <h2>Registrieren / Anmelden</h2>
            <div id="auth-forms">
                <div class="card">
                    <h3>Registrieren</h3>
                    <input id="reg-name" placeholder="Name">
                    <input id="reg-email" placeholder="E-Mail" type="email">
                    <input id="reg-pass" placeholder="Passwort" type="password">
                    <label for="reg-file">Outfit-Foto</label>
                    <input id="reg-file" type="file" accept="image/*" title="Outfit-Foto auswählen">
                    <button id="btn-register">Registrieren & Foto hochladen</button>
                </div>
                <div class="card">
                    <h3>Anmelden</h3>
                    <input id="login-email" placeholder="E-Mail" type="email">
                    <input id="login-pass" placeholder="Passwort" type="password">
                    <button id="btn-login">Anmelden</button>
                    <button id="btn-logout" class="secondary">Abmelden</button>
                </div>
            </div>
            <div id="submit-status"></div>
        </section>

        <section id="panel-browse" class="panel hidden">
            <h2>Outfits ansehen & anonym abstimmen</h2>
            <div id="submissions-list"></div>
        </section>

        <section id="panel-admin" class="panel hidden">
            <h2>Admin Dashboard</h2>
            <div id="admin-login">
                <input id="admin-email" placeholder="Admin E-Mail" type="email">
                <input id="admin-pass" placeholder="Passwort" type="password">
                <button id="btn-admin-login">Admin anmelden</button>
            </div>
            <div id="admin-area" class="hidden">
                <button id="btn-refresh-stats">Statistiken aktualisieren</button>
                <div id="rankings"></div>
                <button id="btn-export-csv">Exportiere CSV</button>
            </div>
        </section>
    </main>

    <footer>
        <small>Für mobile Nutzung optimiert. Firebase-Konfiguration in <em>app.js</em> einfügen.</small>
        <div id="build-banner" style="margin-top:6px;color:#666;font-size:12px;">Build-Version: 2026-04-20 (UI update)</div>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
